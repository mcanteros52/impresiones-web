<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impresiones App</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 500px;
    margin: 60px auto;
    padding: 20px;
    background: #f5f5f5;
  }
  .card {
    background: white;
    border-radius: 12px;
    padding: 32px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  h2 { margin: 0 0 24px; font-size: 20px; color: #111; }
  .drop-zone {
    border: 2px dashed #ccc;
    border-radius: 8px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    color: #888;
    font-size: 14px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .drop-zone:hover { border-color: #666; }
  .drop-zone.selected { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
  input[type="file"] { display: none; }
  .resumen {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    display: none;
  }
  .resumen-row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    padding: 4px 0;
    color: #444;
  }
  .resumen-row.total {
    font-weight: bold;
    font-size: 16px;
    color: #111;
    border-top: 1px solid #e2e8f0;
    margin-top: 8px;
    padding-top: 8px;
  }
  .printer-banner {
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .printer-banner.online { background: #dcfce7; color: #166534; }
  .printer-banner.offline { background: #fee2e2; color: #991b1b; }
  .printer-banner.checking { background: #dbeafe; color: #1e40af; }
  button {
    width: 100%;
    padding: 14px;
    background: #009ee3;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    margin-top: 8px;
    font-weight: bold;
  }
  button:hover { background: #007fc0; }
  button:disabled { background: #93c5fd; cursor: not-allowed; }
  .status {
    margin-top: 16px;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .status.success { background: #dcfce7; color: #166534; display: block; }
  .status.error { background: #fee2e2; color: #991b1b; display: block; }
  .status.loading { background: #dbeafe; color: #1e40af; display: block; }
  .mp-logo { color: #009ee3; font-weight: bold; }
</style>
</head>
<body>
<div class="card">
  <h2>🖨️ Impresiones App</h2>
 
  <div class="printer-banner checking" id="printerBanner">
    ⏳ Verificando estado de la impresora...
  </div>
 
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div id="dropText">Hacé clic para elegir un PDF</div>
  </div>
  <input type="file" id="fileInput" accept=".pdf">
 
  <div class="resumen" id="resumen">
    <div class="resumen-row">
      <span>Páginas detectadas</span>
      <span id="numPaginas">-</span>
    </div>
    <div class="resumen-row">
      <span>Precio por página</span>
      <span>$100</span>
    </div>
    <div class="resumen-row total">
      <span>Total a pagar</span>
      <span id="totalPrecio">-</span>
    </div>
  </div>
 
  <button id="pagarBtn" onclick="iniciarPago()" disabled>
    Pagar con <span class="mp-logo">Mercado Pago</span>
  </button>
 
  <div class="status" id="status"></div>
</div>
 
<script>
  const API_URL = 'https://gkq2wcd8ni.execute-api.us-east-1.amazonaws.com/prod';
  const PRINTNODE_API_KEY = 'tu-api-key-aqui';
  const PRINTER_ID = 75430456;
 
  let archivoSeleccionado = null;
  let pdfBase64 = null;
  let numeroPaginas = 0;
  let impresoraOnline = false;
 
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
 
  async function verificarImpresora() {
    const banner = document.getElementById('printerBanner');
    const btn = document.getElementById('pagarBtn');
 
    try {
      const res = await fetch('https://api.printnode.com/printers/' + PRINTER_ID, {
        headers: { 'Authorization': 'Basic ' + btoa(PRINTNODE_API_KEY + ':') }
      });
      const data = await res.json();
      const printer = Array.isArray(data) ? data[0] : data;
      const computerOnline = printer && printer.computer && printer.computer.state === 'connected';
      const printerState = printer ? printer.state : 'unknown';
 
      if (computerOnline && printerState === 'online') {
        impresoraOnline = true;
        banner.className = 'printer-banner online';
        banner.textContent = '🟢 Impresora lista — podés imprimir sin problemas';
        if (archivoSeleccionado) btn.disabled = false;
      } else {
        impresoraOnline = false;
        banner.className = 'printer-banner offline';
        if (!computerOnline) {
          banner.textContent = '🔴 Impresora sin conexión — no se puede imprimir en este momento. Por favor avisá al encargado.';
        } else {
          banner.textContent = '🔴 Impresora no disponible — no se puede imprimir ahora. Intentá en unos minutos.';
        }
        btn.disabled = true;
      }
    } catch (e) {
      impresoraOnline = false;
      banner.className = 'printer-banner offline';
      banner.textContent = '⚠️ No se pudo verificar la impresora. Intentá más tarde o avisá al encargado.';
      btn.disabled = true;
    }
  }
 
  document.getElementById('fileInput').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    if (!file || file.type !== 'application/pdf') return;
 
    archivoSeleccionado = file;
    document.getElementById('dropText').textContent = '✓ ' + file.name;
    document.getElementById('dropZone').classList.add('selected');
 
    mostrarStatus('loading', 'Analizando PDF...');
 
    try {
      pdfBase64 = await fileToBase64(file);
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      numeroPaginas = pdf.numPages;
 
      document.getElementById('numPaginas').textContent = numeroPaginas;
      document.getElementById('totalPrecio').textContent = '$' + (numeroPaginas * 100).toLocaleString('es-AR');
      document.getElementById('resumen').style.display = 'block';
      document.getElementById('status').style.display = 'none';
 
    } catch (err) {
      mostrarStatus('error', 'Error al leer el PDF: ' + err.message);
    }
  });
 
  async function iniciarPago() {
    if (!archivoSeleccionado) return;
 
    const btn = document.getElementById('pagarBtn');
 
    // Verificacion final antes de cobrar
    await verificarImpresora();
    if (!impresoraOnline) {
      mostrarStatus('error', 'La impresora no esta disponible. No se puede procesar el pago ahora.');
      return;
    }
 
    btn.disabled = true;
    mostrarStatus('loading', 'Creando orden de pago...');
 
    try {
      const archiveId = 'pdf_' + Date.now();
 
      const response = await fetch(API_URL + '/pago', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          paginas: numeroPaginas,
          archiveId: archiveId,
          pdf: pdfBase64
        })
      });
 
      const data = await response.json();
 
      if (data.init_point) {
        mostrarStatus('success', 'Redirigiendo a Mercado Pago...');
        setTimeout(() => {
          window.location.href = data.init_point;
        }, 1000);
      } else {
        throw new Error('No se pudo crear la preferencia de pago');
      }
 
    } catch (err) {
      mostrarStatus('error', 'Error: ' + err.message);
      btn.disabled = false;
    }
  }
 
  function mostrarStatus(tipo, mensaje) {
    const el = document.getElementById('status');
    el.className = 'status ' + tipo;
    el.textContent = (tipo === 'loading' ? '⏳ ' : tipo === 'success' ? '✓ ' : '✗ ') + mensaje;
  }
 
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = function() { resolve(reader.result.split(',')[1]); };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
 
  // Verificar al cargar la pagina
  verificarImpresora();
 
  // Verificar cada 5 segundos
  setInterval(verificarImpresora, 5000);
</script>
</body>
</html>
