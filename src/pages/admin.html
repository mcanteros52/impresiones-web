<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Impresiones</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
  .header { background: #1e293b; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { margin: 0; font-size: 18px; }
  .btn-logout { background: transparent; border: 1px solid #fff; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .container { max-width: 1000px; margin: 32px auto; padding: 0 20px; }
  .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  h2 { margin: 0 0 20px; font-size: 16px; color: #333; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 10px 12px; background: #f8fafc; border-bottom: 2px solid #e2e8f0; color: #64748b; }
  td { padding: 12px; border-bottom: 1px solid #f1f5f9; color: #333; }
  tr:last-child td { border-bottom: none; }
  .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
  .badge.impreso { background: #dcfce7; color: #166534; }
  .badge.pendiente { background: #fef9c3; color: #854d0e; }
  .badge.error { background: #fee2e2; color: #991b1b; }
  .loading { text-align: center; padding: 40px; color: #888; }
  .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { background: white; border-radius: 12px; padding: 40px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
  .login-card h2 { margin: 0 0 8px; }
  .login-card p { color: #888; margin: 0 0 24px; }
  .btn-login { background: #2563eb; color: white; border: none; padding: 12px 32px; border-radius: 8px; font-size: 15px; cursor: pointer; width: 100%; }
  .btn-login:hover { background: #1d4ed8; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat { background: white; border-radius: 10px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .stat-num { font-size: 28px; font-weight: bold; color: #1e293b; }
  .stat-label { font-size: 13px; color: #888; margin-top: 4px; }
</style>
</head>
<body>

<div id="loginScreen" class="login-screen" style="display:none;">
  <div class="login-card">
    <h2>🖨️ Admin</h2>
    <p>Acceso restringido</p>
    <button class="btn-login" onclick="login()">Iniciar sesión con Cognito</button>
  </div>
</div>

<div id="adminScreen" style="display:none;">
  <div class="header">
    <h1>🖨️ Panel de Administración</h1>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>
  <div class="container">
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="totalImpresiones">-</div>
        <div class="stat-label">Total impresiones</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="totalPaginas">-</div>
        <div class="stat-label">Páginas impresas</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="totalRecaudado">-</div>
        <div class="stat-label">Recaudado (ARS)</div>
      </div>
    </div>
    <div class="card">
      <h2>Historial de impresiones</h2>
      <div id="tabla"><div class="loading">Cargando...</div></div>
    </div>
  </div>
</div>

<script>
  const COGNITO_DOMAIN = 'https://us-east-1hxrphav8v.auth.us-east-1.amazoncognito.com';
  const CLIENT_ID = '10sbkt2oleu1guju02cho0bta9';
  const REDIRECT_URI = 'https://main.dtlj9jer6t72g.amplifyapp.com/admin';
  const API_URL = 'https://gkq2wcd8ni.execute-api.us-east-1.amazonaws.com/prod';
  const ADMIN_EMAIL = 'mcanteros52@gmail.com';

  async function init() {
    const code = new URLSearchParams(window.location.search).get('code');

    if (code) {
      await exchangeCode(code);
      window.history.replaceState({}, '', '/admin');
    }

    const token = sessionStorage.getItem('id_token');
    if (token) {
      const email = getEmailFromToken(token);
      if (email === ADMIN_EMAIL) {
        showAdmin();
        cargarImpresiones();
      } else {
        sessionStorage.clear();
        document.getElementById('loginScreen').style.display = 'flex';
      }
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
    }
  }

  async function exchangeCode(code) {
    const response = await fetch(`${COGNITO_DOMAIN}/oauth2/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        client_id: CLIENT_ID,
        code: code,
        redirect_uri: REDIRECT_URI
      })
    });
    const data = await response.json();
    if (data.id_token) {
      sessionStorage.setItem('id_token', data.id_token);
      sessionStorage.setItem('access_token', data.access_token);
    }
  }

  function getEmailFromToken(token) {
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      return payload.email;
    } catch { return null; }
  }

  function login() {
    window.location.href = `${COGNITO_DOMAIN}/login?client_id=${CLIENT_ID}&response_type=code&scope=email+openid+phone&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
  }

  function logout() {
    sessionStorage.clear();
    window.location.href = `${COGNITO_DOMAIN}/logout?client_id=${CLIENT_ID}&logout_uri=${encodeURIComponent(REDIRECT_URI)}`;
  }

  function showAdmin() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
  }

  async function cargarImpresiones() {
    try {
      const token = sessionStorage.getItem('access_token');
      const response = await fetch(`${API_URL}/admin/impresiones`, {
        headers: { 'Authorization': token }
      });
      const data = await response.json();
      mostrarTabla(data.items || []);
    } catch (e) {
      document.getElementById('tabla').innerHTML = '<div class="loading">Error al cargar datos</div>';
    }
  }

  function mostrarTabla(items) {
    if (items.length === 0) {
      document.getElementById('tabla').innerHTML = '<div class="loading">No hay impresiones registradas</div>';
      return;
    }

    let total = items.length;
    let paginas = items.reduce((s, i) => s + parseInt(i.paginas?.N || 0), 0);
    let recaudado = items.reduce((s, i) => s + parseInt(i.precio?.N || 0), 0);

    document.getElementById('totalImpresiones').textContent = total;
    document.getElementById('totalPaginas').textContent = paginas;
    document.getElementById('totalRecaudado').textContent = '$' + recaudado.toLocaleString('es-AR');

    let html = `<table>
      <thead><tr>
        <th>Fecha</th>
        <th>Páginas</th>
        <th>Precio</th>
        <th>Estado</th>
        <th>Fecha impresión</th>
      </tr></thead><tbody>`;

    items.sort((a, b) => new Date(b.fecha?.S) - new Date(a.fecha?.S)).forEach(item => {
      const estado = item.estado?.S || 'pendiente';
      const fecha = item.fecha?.S ? new Date(item.fecha.S).toLocaleString('es-AR') : '-';
      const fechaImp = item.fechaImpresion?.S ? new Date(item.fechaImpresion.S).toLocaleString('es-AR') : '-';
      html += `<tr>
        <td>${fecha}</td>
        <td>${item.paginas?.N || '-'}</td>
        <td>$${item.precio?.N || '-'}</td>
        <td><span class="badge ${estado}">${estado}</span></td>
        <td>${fechaImp}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('tabla').innerHTML = html;
  }

  init();
</script>
</body>
</html>
